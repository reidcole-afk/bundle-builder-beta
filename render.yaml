services:
  - type: web
    name: bundle-builder-beta
    runtime: node
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: BUNDLE_BUILDER_ALLOWED_NETWORKS
        value: base
      - key: BUNDLE_BUILDER_MIN_LIQUIDITY_USD
        value: "250000"
      - key: BUNDLE_BUILDER_MIN_VOLUME_24H_USD
        value: "100000"
      - key: CORS_ORIGIN
        value: https://bundlebuilder.vicicoin.io
      - key: DATABASE_URL
        sync: false
      - key: BUNDLE_BUILDER_COINGECKO_PRELOAD_ENABLED
        value: "false"
      - key: BUNDLE_BUILDER_PULSE_COLLECTOR_INTERVAL_MS
        value: "1200000"
      - key: BUNDLE_BUILDER_PULSE_COLLECTOR_STARTUP_DELAY_MS
        value: "150000"
      - key: BUNDLE_BUILDER_PULSE_COLLECTOR_DECK_SIZE
        value: "8"
      - key: BUNDLE_BUILDER_PULSE_COLLECTOR_STAGGER_MS
        value: "2500"
      - key: BUNDLE_BUILDER_PULSE_COLLECTOR_DEX_CACHE_MS
        value: "3600000"
      - key: BUNDLE_BUILDER_PULSE_COLLECTOR_DEX_MIN_NETWORK_REFRESH_MS
        value: "21600000"
      - key: BUNDLE_BUILDER_PULSE_COLLECTOR_DEX_STALE_MS
        value: "172800000"
      - key: BUNDLE_BUILDER_PULSE_COLLECTOR_DEX_RATE_LIMIT_COOLDOWN_MS
        value: "900000"
      - key: BUNDLE_BUILDER_PULSE_COLLECTOR_REFRESH_BATCH_SIZE
        value: "2"
      - key: BUNDLE_BUILDER_PULSE_ANALYST_QUOTA_COOLDOWN_MS
        value: "21600000"
      - key: BUNDLE_BUILDER_PULSE_ANALYST_RATE_LIMIT_COOLDOWN_MS
        value: "1800000"
      - key: BUNDLE_BUILDER_MARKET_CHART_CACHE_MS
        value: "1800000"
      - key: BUNDLE_BUILDER_MARKET_CHART_STALE_MS
        value: "43200000"
      - key: BUNDLE_BUILDER_MARKET_CHART_LAST_GOOD_MS
        value: "604800000"
      - key: BUNDLE_BUILDER_MARKET_CHART_BACKGROUND_REFRESH_COOLDOWN_MS
        value: "1800000"
